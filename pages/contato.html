<!doctype html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pear Brasil</title>
    <link rel="stylesheet" href="../css/contato.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../assets/favicon_io/favicon.ico"
      type="image/x-icon"
    />
  </head>

  <body>
    <nav>
      <a href="/projetoFinal/index.html"
        ><img id="pear" src="../assets/perlogo-nobg.png" alt=""
      /></a>

      <ul class="nav-list">
        <li><a class="links" href="../index.html">Início</a></li>
        <li><a class="links" href="../pages/produtos.html">Produtos</a></li>
        <li><a class="links" href="../pages/sobre.html">Sobre</a></li>
        <li class="active">
          <a id="atual" class="links" href="../pages/contato.html">Contato</a>
        </li>
      </ul>
    </nav>

    <header></header>

    <main>
      <div id="container-contato">
        <div id="textosExternos">
          <h1 id="titulo">
            Entrar em <br />
            contato
          </h1>

          <h2 id="subtitulo">
            Estamos ansiosos para atender à sua solicitação.
          </h2>
        </div>

        <div id="msg-contato">
          <div id="form-contato">
            <div id="telefones">
              <img
                class="images-contato"
                src="/project-senai/assets/images-contato/location.png"
                alt=""
              />
              <h1>
                Alameda Wagih Salles Nemer, 124 - Centro, Barueri - SP,
                06401-134
              </h1>
              <h2>Edifício Sede Pear</h2>

              <img
                class="images-contato"
                src="/project-senai/assets/images-contato/phone.png"
                alt=""
              />
              <h1>(11) 3322-0067</h1>
              <h2>Central de atendimento</h2>

              <img
                class="images-contato"
                src="/project-senai/assets/images-contato/mail.png"
                alt=""
              />
              <h1>pearbrasil@pear.com</h1>
              <h2>E-mail corporativo</h2>
            </div>

            <form action="">
              <label for="nome">Nome</label>
              <input type="text" name="nome" id="nome" placeholder="Seu nome" />

              <label for="email">Email</label>
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Seu email"
              />

              <label for="assunto">Assunto</label>
              <input
                type="text"
                name="assunto"
                id="assunto"
                placeholder="Assunto"
              />

              <label for="btn-msg">Mensagem</label>
              <textarea
                name="btn-msg"
                id="btn-msg"
                placeholder="Mensagem"
              ></textarea>

              <button type="submit">Enviar</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
